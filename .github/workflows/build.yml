name: Build, Test, and Release

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*' # Trigger on version tags like v0.1.0
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: hica-linux-x86_64
          - os: macos-latest
            artifact: hica-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Koka
        run: |
          curl -sSL https://github.com/koka-lang/koka/releases/latest/download/install.sh | sudo sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build (release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          koka -O2 -isrc src/main.kk -o hica
          chmod +x hica

      - name: Build (debug)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          koka -ilib/klap -isrc src/main.kk -o hica
          chmod +x hica

      - name: Verify binary
        run: ./hica --version

      - name: Run lexer tests
        run: |
          koka -ilib/kunit -isrc -e tests/test-lexer.kk

      - name: Run parser tests
        run: |
          koka -ilib/kunit -isrc -e tests/test-parser.kk

      - name: Run codegen tests
        run: |
          koka -ilib/kunit -isrc -e tests/test-codegen.kk

      - name: Run CLI e2e tests
        run: |
          koka -ilib/kunit -ilib/klap -isrc -e tests/test-cli.kk -- ./hica

      - name: Strip binary (Linux)
        if: runner.os == 'Linux'
        run: strip hica

      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: codesign --sign - --force hica

      - name: Package
        run: tar czf ${{ matrix.artifact }}.tar.gz hica

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.tar.gz'
          generate_release_notes: true