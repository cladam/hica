name: Build, Test, and Release

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*' # Trigger on version tags like v0.1.0
    paths-ignore:
      - 'README.md'
      - 'documentation/**'
      - 'docs/**'
      - '_config.yaml'
      - '_layouts/**'
      - '_includes/**'
      - 'Gemfile'
      - 'index.html'
      - 'assets/css/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'documentation/**'
      - 'docs/**'
      - '_config.yaml'
      - '_layouts/**'
      - '_includes/**'
      - 'Gemfile'
      - 'index.html'
      - 'assets/css/**'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: hica-linux-x86_64
          - os: ubuntu-24.04-arm
            artifact: hica-linux-arm64
          - os: macos-latest
            artifact: hica-macos-arm64
          - os: windows-latest
            artifact: hica-windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Koka (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -sSL https://github.com/koka-lang/koka/releases/latest/download/install.sh | sudo sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Koka (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          curl -sSL -o "$env:TEMP\install-koka.bat" https://github.com/koka-lang/koka/releases/latest/download/install.bat
          & "$env:TEMP\install-koka.bat"
          "$env:LOCALAPPDATA\koka\bin" | Out-File -Append -FilePath $env:GITHUB_PATH

      - name: Install libcurl (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libcurl4-openssl-dev

      - name: Install libcurl (macOS)
        if: runner.os == 'macOS'
        run: brew install curl

      - name: Install libcurl (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install curl:x64-windows
          vcpkg integrate install
          $vcpkgRoot = Split-Path (Get-Command vcpkg).Path -Parent
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -Append -FilePath $env:GITHUB_ENV

      - name: Build (release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            make release KOKA_EXTRA_FLAGS="--ccopts=-I${VCPKG_ROOT}/installed/x64-windows/include --cclinkopts=-Wl,/LIBPATH:${VCPKG_ROOT}/installed/x64-windows/lib"
          else
            make release
          fi
        shell: bash

      - name: Build (debug)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            make build KOKA_EXTRA_FLAGS="--ccopts=-I${VCPKG_ROOT}/installed/x64-windows/include --cclinkopts=-Wl,/LIBPATH:${VCPKG_ROOT}/installed/x64-windows/lib"
          else
            make build
          fi
        shell: bash

      - name: Verify binary (Unix)
        if: runner.os != 'Windows'
        run: ./hica --version

      - name: Verify binary (Windows)
        if: runner.os == 'Windows'
        run: .\hica.exe --version
        shell: pwsh

      - name: Run lexer tests
        run: make test-lexer
        shell: bash

      - name: Run parser tests
        run: make test-parser
        shell: bash

      - name: Run codegen tests
        run: make test-codegen
        shell: bash

      - name: Run CLI e2e tests (Unix)
        if: runner.os != 'Windows'
        run: make test-cli

      - name: Run CLI e2e tests (Windows)
        if: runner.os == 'Windows'
        run: |
          koka -ilib/kunit -ilib/klap -isrc -e tests/test-cli.kk -- hica.exe
        shell: bash
        continue-on-error: true  # 3 tests fail due to path handling in hica run/test on Windows

      - name: Install choreo (Unix)
        if: runner.os != 'Windows'
        run: |
          cargo install choreo
        shell: bash

      - name: Run choreo acceptance tests (Unix) - CLI
        if: runner.os != 'Windows'
        run: make choreo-cli
        shell: bash

      - name: Run choreo acceptance tests (Unix) - REPL
        if: runner.os != 'Windows'
        run: make choreo-repl
        shell: bash

      - name: Run JS backend tests (Unix)
        if: runner.os != 'Windows'
        run: make test-js
        shell: bash

      - name: Strip binary (Linux)
        if: runner.os == 'Linux'
        run: strip hica

      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: codesign --sign - --force hica

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar czf ${{ matrix.artifact }}.tar.gz hica

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path hica.exe -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.zip
          generate_release_notes: true