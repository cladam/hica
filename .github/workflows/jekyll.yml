# Build Jekyll site and deploy to hica.dev via SFTP
name: Deploy Jekyll site to hica.dev

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@4a9ddd6f338a97768b8006bf671dfbad383215f4
        with:
          ruby-version: '3.1'
          bundler-cache: true
          cache-version: 0
      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'
      - name: Build mdBook (Hica for Kids)
        run: mdbook build documentation/hica-for-kids-book
      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl ""
        env:
          JEKYLL_ENV: production
      - name: Copy mdBook into Jekyll output
        run: cp -r documentation/hica-for-kids-book/book _site/hica-for-kids
      - name: Install lftp
        run: sudo apt-get install -y lftp
      - name: Test SFTP connection
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASS }}
        run: |
          cat > /tmp/lftp-test.txt << 'EOF'
          set net:timeout 15
          set net:max-retries 1
          set ftp:passive-mode yes
          ls
          quit
          EOF
          lftp -d -u "$SFTP_USER","$SFTP_PASS" ftp://"$SFTP_HOST":21 < /tmp/lftp-test.txt
      - name: Deploy via SFTP
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASS }}
        run: |
          cat > /tmp/lftp-deploy.txt << 'EOF'
          set net:timeout 30
          set net:max-retries 3
          set ftp:passive-mode yes
          mirror -R --delete --verbose _site/ /
          quit
          EOF
          lftp -d -u "$SFTP_USER","$SFTP_PASS" ftp://"$SFTP_HOST":21 < /tmp/lftp-deploy.txt

