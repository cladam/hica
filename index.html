<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="A modern, expressive and fast systems language built in Koka with algebraic effects." name="description"/>
    <meta content="hica, programming language, koka, algebraic effects, systems language, functional programming" name="keywords">
    <meta content="index, follow" name="robots">

    <title>hica — A Modern Systems Language with Algebraic Effects</title>

    <link href="/hica/assets/hica-icon.png" rel="icon" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .selection-indigo::selection { background-color: rgba(79, 70, 229, 0.2); }
    </style>
</head>

<body class="bg-[#FCFCFC] text-[#334155] selection-indigo">
<div id="root"></div>

<script type="text/babel">
    const {useState, useEffect} = React;

    const Icon = ({name, size = 24, className = "", style = {}}) => {
        useEffect(() => {
            if (window.lucide) window.lucide.createIcons();
        }, [name]);
        return <i data-lucide={name} className={className} style={{width: size, height: size, ...style}}></i>;
    };

    const App = () => {
        const theme = {
            indigo: '#4f46e5',
            cyan: '#0891b2',
            primary: '#1e293b',
            secondary: '#64748b',
            bgLight: '#f8fafc',
            border: '#e2e8f0',
            codeBg: '#f6f8fa',
            syntax: {
                keyword: '#7c3aed',
                builtin: '#0550ae',
                function: '#0891b2',
                string: '#16a34a',
                comment: '#94a3b8',
                punctuation: '#64748b'
            }
        };

        return (
            <div className="min-h-screen flex flex-col">
                {/* Hero Section */}
                <header className="relative pt-20 pb-20 overflow-hidden bg-white border-b border-[#f1f5f9]">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 text-center">
                        <div className="flex justify-center mb-8">
                            <img src="assets/hica-logo.png" alt="hica Logo" className="h-24 w-auto"
                                 onError={(e) => e.target.style.display = 'none'}/>
                        </div>
                        <h1 className="text-4xl md:text-7xl font-extrabold tracking-tight text-[#1e293b] mb-6">
                            A <span style={{color: theme.indigo}}>modern</span>, expressive systems language.
                        </h1>
                        <p className="text-xl md:text-2xl text-[#64748b] max-w-3xl mx-auto mb-12 leading-relaxed font-medium">
                            Expression-oriented. Effect-tracked. Compiled to <strong>C</strong>, <strong>JS</strong>, or <strong>WASM</strong> via Koka.
                            No garbage collector. Strong inference. Familiar syntax.
                        </p>
                        <div className="flex flex-col sm:flex-row justify-center gap-4">
                            <a href="https://cladam.github.io/hica/docs/intro"
                               className="px-8 py-4 rounded-xl font-bold text-lg text-white shadow-lg transition-all flex items-center justify-center gap-2"
                               style={{backgroundColor: theme.indigo}}>
                                Read the docs <Icon name="arrow-right" size={20}/>
                            </a>
                            <a href="https://github.com/cladam/hica"
                               className="bg-white text-[#1e293b] border-2 border-[#e2e8f0] px-8 py-4 rounded-xl font-bold text-lg hover:border-[#4f46e5]/30 transition-all flex items-center justify-center gap-2">
                                <Icon name="github" size={20}/> View on GitHub
                            </a>
                        </div>
                    </div>
                </header>

                {/* Code Demo Section */}
                <section className="py-12 bg-[#f8fafc]">
                    <div className="max-w-5xl mx-auto px-4 lg:px-0">
                        <div className="bg-[#f6f8fa] rounded-2xl shadow-xl overflow-hidden border border-[#e2e8f0]">
                            <div className="flex items-center justify-between px-6 py-4 bg-white/50 border-b border-[#e2e8f0]">
                                <div className="flex gap-2">
                                    <div className="w-3 h-3 rounded-full bg-slate-200"></div>
                                    <div className="w-3 h-3 rounded-full bg-slate-200"></div>
                                    <div className="w-3 h-3 rounded-full bg-slate-200"></div>
                                </div>
                                <div className="text-xs font-bold font-mono text-[#64748b] tracking-widest">fizzbuzz.hc</div>
                                <div className="w-10"></div>
                            </div>
                            <div className="p-8 md:p-12 font-mono text-sm md:text-base leading-loose overflow-x-auto text-[#1e293b]">
                                <div className="flex gap-6">
                                    <div className="text-[#cbd5e1] select-none text-right w-8 border-r border-slate-200 pr-4">
                                        1<br/>2<br/>3<br/>4<br/>5<br/>6<br/>7<br/>8<br/>9<br/>10<br/>11
                                    </div>
                                    <div className="flex-1 whitespace-pre">
                                        <span style={{color: theme.syntax.keyword, fontWeight: 'bold'}}>fun </span>
                                        <span style={{color: theme.syntax.function}}>fizzbuzz</span>
                                        <span style={{color: theme.syntax.punctuation}}>(n) =&gt;</span>{"\n"}
                                        {"  "}<span style={{color: theme.syntax.keyword, fontWeight: 'bold'}}>if </span>
                                        <span>n % 15 == 0 </span>
                                        <span style={{color: theme.syntax.punctuation}}>{"{"} </span>
                                        <span style={{color: theme.syntax.string}}>"fizzbuzz"</span>
                                        <span style={{color: theme.syntax.punctuation}}> {"}"}</span>{"\n"}
                                        {"  "}<span style={{color: theme.syntax.keyword, fontWeight: 'bold'}}>else if </span>
                                        <span>n % 3 == 0 </span>
                                        <span style={{color: theme.syntax.punctuation}}>{"{"} </span>
                                        <span style={{color: theme.syntax.string}}>"fizz"</span>
                                        <span style={{color: theme.syntax.punctuation}}> {"}"}</span>{"\n"}
                                        {"  "}<span style={{color: theme.syntax.keyword, fontWeight: 'bold'}}>else if </span>
                                        <span>n % 5 == 0 </span>
                                        <span style={{color: theme.syntax.punctuation}}>{"{"} </span>
                                        <span style={{color: theme.syntax.string}}>"buzz"</span>
                                        <span style={{color: theme.syntax.punctuation}}> {"}"}</span>{"\n"}
                                        {"  "}<span style={{color: theme.syntax.keyword, fontWeight: 'bold'}}>else </span>
                                        <span style={{color: theme.syntax.punctuation}}>{"{"} </span>
                                        <span style={{color: theme.syntax.function}}>show</span>
                                        <span style={{color: theme.syntax.punctuation}}>(n) {"}"}</span>{"\n"}
                                        {"\n"}
                                        <span style={{color: theme.syntax.keyword, fontWeight: 'bold'}}>fun </span>
                                        <span style={{color: theme.syntax.function}}>main</span>
                                        <span style={{color: theme.syntax.punctuation}}>() {"{"}</span>{"\n"}
                                        {"  "}<span style={{color: theme.syntax.keyword, fontWeight: 'bold'}}>for </span>
                                        <span>i </span>
                                        <span style={{color: theme.syntax.keyword, fontWeight: 'bold'}}>in </span>
                                        <span style={{color: theme.syntax.builtin}}>0</span>
                                        <span style={{color: theme.syntax.punctuation}}>..</span>
                                        <span style={{color: theme.syntax.builtin}}>20</span>
                                        <span style={{color: theme.syntax.punctuation}}> {"{"}</span>{"\n"}
                                        {"    "}<span style={{color: theme.syntax.function}}>println</span>
                                        <span style={{color: theme.syntax.punctuation}}>(</span>
                                        <span style={{color: theme.syntax.function}}>fizzbuzz</span>
                                        <span style={{color: theme.syntax.punctuation}}>(i + </span>
                                        <span style={{color: theme.syntax.builtin}}>1</span>
                                        <span style={{color: theme.syntax.punctuation}}>))</span>{"\n"}
                                        {"  "}<span style={{color: theme.syntax.punctuation}}>{"}"}</span>{"\n"}
                                        <span style={{color: theme.syntax.punctuation}}>{"}"}</span>
                                    </div>
                                </div>
                            </div>
                            <div className="bg-white p-5 border-t border-[#e2e8f0] flex items-center gap-3">
                                <div className="w-6 h-6 rounded-full flex items-center justify-center text-white"
                                     style={{backgroundColor: theme.indigo}}>
                                    <Icon name="check-circle-2" size={14}/>
                                </div>
                                <span className="text-sm font-bold text-[#1e293b]">Everything is an expression. <code className="font-mono text-sm px-1.5 py-0.5 bg-indigo-50 text-indigo-600 rounded">if</code>, <code className="font-mono text-sm px-1.5 py-0.5 bg-indigo-50 text-indigo-600 rounded">match</code>, and blocks all return values.</span>
                            </div>
                        </div>
                    </div>
                </section>

                {/* Philosophy Section */}
                <section className="py-24 bg-white overflow-hidden">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="grid md:grid-cols-2 gap-16 items-center">
                            <div className="relative">
                                <div className="absolute -top-10 -left-10 w-32 h-32 opacity-10 bg-[#4f46e5] rounded-full blur-3xl"></div>
                                <h2 className="text-4xl font-bold mb-6 text-[#1e293b]">Why hica exists.</h2>
                                <p className="text-lg text-[#64748b] mb-6 leading-relaxed">
                                    Most languages force you to choose: easy to learn <em>or</em> safe and fast.
                                    hica gives you both — familiar syntax with Rust-level safety.
                                </p>
                                <div className="bg-[#f8fafc] p-6 rounded-xl border-l-4 border-[#4f46e5] italic text-[#1e293b] font-medium mb-8">
                                    "You write the easy version, and hica's translator turns it into the
                                    hardcore version for the computer."
                                </div>
                                <p className="text-[#64748b] leading-relaxed">
                                    By targeting Koka, hica inherits Perceus reference counting, algebraic effects,
                                    and compilation to C — without reinventing any of it.
                                </p>
                            </div>
                            <div className="grid grid-cols-1 gap-6">
                                {[
                                    {title: "Expression-Oriented", desc: "Everything returns a value: if, match, and blocks. No void surprises.", icon: "zap"},
                                    {title: "Strong Inference", desc: "Hindley-Milner type inference catches bugs at compile time. Annotations optional.", icon: "shield-check"},
                                    {title: "No GC", desc: "Perceus reference counting from Koka. Fast, predictable, no pauses.", icon: "cpu"}
                                ].map(item => (
                                    <div key={item.title}
                                         className="bg-white p-6 rounded-2xl border border-[#e2e8f0] shadow-sm hover:shadow-md transition-shadow flex gap-4">
                                        <div className="flex-shrink-0 w-12 h-12 rounded-lg flex items-center justify-center"
                                             style={{backgroundColor: `${theme.indigo}10`, color: theme.indigo}}>
                                            <Icon name={item.icon} size={24}/>
                                        </div>
                                        <div>
                                            <h3 className="font-bold text-[#1e293b] mb-1">{item.title}</h3>
                                            <p className="text-sm text-[#64748b]">{item.desc}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </section>

                {/* Features Grid */}
                <section className="py-24 bg-[#f8fafc] border-y border-[#e2e8f0]">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="text-center mb-16">
                            <h2 className="text-4xl font-bold text-[#1e293b] mb-4">Built for Real Programs.</h2>
                            <p className="text-xl text-[#64748b] font-medium max-w-2xl mx-auto">
                                From hello world to systems programming — hica scales with you.
                            </p>
                        </div>
                        <div className="grid md:grid-cols-3 gap-8">
                            {[
                                {icon: 'arrow-right', name: 'Arrow Syntax', desc: 'Expression-bodied functions with =>. One line, no return keyword, no fuss.'},
                                {icon: 'git-branch', name: 'Pattern Matching', desc: 'match with integers, strings, Some/None, Ok/Err, and wildcards. Core from day one.'},
                                {icon: 'repeat', name: 'For & Repeat', desc: 'for i in 0..n ranges, for x in list iteration, and repeat(n) blocks.'},
                                {icon: 'link', name: 'Pipe Operator', desc: 'Chain functions left-to-right with |>. Data flows naturally through pipelines.'},
                                {icon: 'box', name: 'Maybe & Result', desc: 'Optional values and error handling as types. The compiler forces you to handle both cases.'},
                                {icon: 'layers', name: 'Compiles to C', desc: 'Through Koka: native binaries, JavaScript, or WASM. Real performance for real programs.'}
                            ].map(feature => (
                                <div key={feature.name}
                                     className="bg-white p-8 rounded-2xl shadow-sm border border-[#e2e8f0] hover:shadow-md transition-all">
                                    <div className="w-12 h-12 rounded-xl flex items-center justify-center mb-6"
                                         style={{backgroundColor: `${theme.indigo}15`, color: theme.indigo}}>
                                        <Icon name={feature.icon} size={24}/>
                                    </div>
                                    <h3 className="text-xl font-bold mb-3 text-[#1e293b]">{feature.name}</h3>
                                    <p className="text-[#64748b] text-sm leading-relaxed font-medium">{feature.desc}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>

                {/* Pipeline Section */}
                <section className="py-24 bg-white">
                    <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
                        <h2 className="text-4xl font-bold mb-16 text-[#1e293b]">The Compilation Pipeline.</h2>
                        <div className="flex flex-col md:flex-row items-center justify-center gap-4">
                            {[
                                {label: '.hc SOURCE', sub: 'Your Code'},
                                {label: 'LEX + PARSE', sub: 'Pratt Parser'},
                                {label: 'TYPE CHECK', sub: 'Hindley-Milner'},
                                {label: 'EMIT .kk', sub: 'Koka Source'},
                                {label: 'C / JS / WASM', sub: 'Native Binary', highlight: true}
                            ].map((step, i) => (
                                <React.Fragment key={step.label}>
                                    {i > 0 && <Icon name="arrow-right" className="text-[#e2e8f0] hidden md:block"/>}
                                    <div className={`w-full p-6 rounded-2xl border ${step.highlight
                                        ? 'border-2'
                                        : 'border-dashed border-[#e2e8f0] bg-[#f8fafc]'}`}
                                         style={step.highlight ? {backgroundColor: `${theme.indigo}08`, borderColor: theme.indigo} : {}}>
                                        <span className={`block font-bold mb-1 tracking-[0.15em] text-xs uppercase ${step.highlight ? '' : 'text-[#64748b]'}`}
                                              style={step.highlight ? {color: theme.indigo} : {}}>
                                            {step.label}
                                        </span>
                                        <span className={`text-sm font-bold ${step.highlight ? 'font-extrabold' : ''} text-[#1e293b]`}>{step.sub}</span>
                                    </div>
                                </React.Fragment>
                            ))}
                        </div>
                        <p className="mt-16 text-xl text-[#64748b] max-w-2xl mx-auto leading-relaxed">
                            Each phase uses <strong>algebraic effects</strong> for compiler state — diagnostics,
                            type variables, and symbol scopes are all effect-tracked.
                        </p>
                    </div>
                </section>

                {/* Call to Action */}
                <section className="py-24 bg-[#1e293b] relative overflow-hidden">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center relative z-10">
                        <h2 className="text-4xl md:text-5xl font-bold text-white mb-10">Ready to try hica?</h2>
                        <div className="flex flex-col sm:flex-row justify-center gap-5">
                            <a href="https://cladam.github.io/hica/docs/quick-start"
                               className="px-10 py-4 rounded-xl font-bold text-lg text-white hover:opacity-90 transition-all flex items-center justify-center gap-2 shadow-lg"
                               style={{backgroundColor: theme.indigo}}>
                                <Icon name="book-open" size={20}/> Quick Start
                            </a>
                            <a href="https://cladam.github.io/hica/docs/learn"
                               className="bg-transparent border-2 border-white/20 text-white px-10 py-4 rounded-xl font-bold text-lg hover:bg-white/10 transition-all flex items-center justify-center gap-2">
                                <Icon name="graduation-cap" size={20}/> Learn hica
                            </a>
                            <a href="https://github.com/cladam/hica"
                               className="bg-transparent border-2 border-white/20 text-white px-10 py-4 rounded-xl font-bold text-lg hover:bg-white/10 transition-all flex items-center justify-center gap-2">
                                <Icon name="github" size={20}/> Explore Source
                            </a>
                        </div>
                    </div>
                    <div className="absolute top-0 right-0 w-96 h-96 opacity-20 blur-[120px]"
                         style={{backgroundColor: theme.indigo}}></div>
                    <div className="absolute bottom-0 left-0 w-96 h-96 opacity-10 blur-[120px]"
                         style={{backgroundColor: theme.cyan}}></div>
                </section>

                {/* Footer */}
                <footer className="py-16 bg-white border-t border-[#e2e8f0]">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex flex-col md:flex-row justify-between items-center gap-10 text-[#64748b] text-sm">
                            <div className="flex items-center gap-5">
                                <img src="assets/hica-logo.png" alt="hica Logo" className="h-6 w-auto"
                                     onError={(e) => e.target.style.display = 'none'}/>
                                <span className="text-[#e2e8f0]">|</span>
                                <span className="font-medium">Open Source (Apache-2.0) by <a
                                    href="https://cladam.github.io"
                                    className="hover:text-[#4f46e5] underline decoration-2 underline-offset-4 transition-colors">Claes Adamsson</a></span>
                            </div>
                            <div className="flex items-center gap-8 font-semibold">
                                <a href="https://github.com/cladam/hica/issues" className="hover:text-[#1e293b] transition-colors">Report Issue</a>
                                <a href="https://koka-lang.github.io/" className="hover:text-[#1e293b] transition-colors">Koka</a>
                                <a href="https://github.com/cladam/hica">
                                    <Icon name="github" size={20} className="hover:text-[#1e293b] cursor-pointer transition-colors"/>
                                </a>
                            </div>
                        </div>
                    </div>
                </footer>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
</script>
</body>
</html>
